<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCURide — Ingresá</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --teal:#1abc9c;
  --teal-dark:#13967c;
  --teal-dim:rgba(26,188,156,0.12);
  --gold:#f0c040;
  --navy:#000d1f;
  --blue-deep:#001a3d;
  --white:#ffffff;
  --muted:rgba(255,255,255,0.45);
  --border:rgba(255,255,255,0.08);
}

html,body{
  height:100%;
  background:var(--navy);
  font-family:'DM Sans',sans-serif;
  color:var(--white);
  overflow:hidden;
}

/* ── LAYOUT ─────────────────────────────────────── */
.auth-shell{
  display:flex;
  height:100vh;
  width:100vw;
}

/* ── LEFT PANEL ─────────────────────────────────── */
.panel-left{
  position:relative;
  flex:0 0 58%;
  overflow:hidden;
}

#heroCanvas{
  display:block;
  width:100%;
  height:100%;
}

/* Overlay gradient so form side blends */
.panel-left::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent 70%,rgba(0,8,20,0.92) 100%);
  pointer-events:none;
}

/* Floating brand badge */
.brand-badge{
  position:absolute;
  top:28px;
  left:32px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:10;
  animation:fadeDown .8s ease both;
}

.brand-badge .logo-mark{
  width:36px;
  height:36px;
  background:var(--teal);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.brand-badge .logo-mark svg{
  width:20px;
  height:20px;
  fill:none;
  stroke:var(--white);
  stroke-width:2.2;
  stroke-linecap:round;
}

.brand-badge .brand-name{
  font-family:'Syne',sans-serif;
  font-weight:800;
  font-size:18px;
  letter-spacing:-.3px;
  color:var(--white);
}

.brand-badge .brand-name span{
  color:var(--teal);
}

/* Bottom tagline overlay */
.hero-tagline{
  position:absolute;
  bottom:36px;
  left:32px;
  z-index:10;
  animation:fadeUp 1s ease .4s both;
}

.hero-tagline p{
  font-family:'Syne',sans-serif;
  font-size:22px;
  font-weight:700;
  line-height:1.25;
  color:var(--white);
  text-shadow:0 2px 20px rgba(0,0,0,0.7);
  max-width:280px;
}

.hero-tagline p em{
  font-style:normal;
  color:var(--teal);
}

.hero-tagline small{
  display:block;
  margin-top:8px;
  font-size:13px;
  color:var(--muted);
  font-weight:300;
}

/* ── RIGHT PANEL ─────────────────────────────────── */
.panel-right{
  flex:1;
  background:#000d1f;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:48px 40px;
  position:relative;
  overflow:hidden;
}

/* Subtle noise texture */
.panel-right::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  opacity:.4;
}

.form-card{
  width:100%;
  max-width:360px;
  position:relative;
  z-index:1;
  animation:fadeUp .9s ease .15s both;
}

.form-header{
  margin-bottom:36px;
}

.form-header .greeting{
  font-size:12px;
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--teal);
  margin-bottom:10px;
}

.form-header h1{
  font-family:'Syne',sans-serif;
  font-size:30px;
  font-weight:800;
  line-height:1.15;
  color:var(--white);
}

.form-header h1 span{
  display:block;
  font-size:15px;
  font-weight:400;
  font-family:'DM Sans',sans-serif;
  color:var(--muted);
  margin-top:8px;
  letter-spacing:0;
}

/* ── FIELDS ──────────────────────────────────────── */
.field-group{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-bottom:24px;
}

.field{
  position:relative;
}

.field label{
  display:block;
  font-size:11px;
  font-weight:500;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:8px;
  transition:color .2s;
}

.field:focus-within label{
  color:var(--teal);
}

.field input{
  width:100%;
  height:48px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  padding:0 44px 0 16px;
  outline:none;
  transition:border-color .2s, background .2s;
  -webkit-appearance:none;
}

.field input::placeholder{
  color:rgba(255,255,255,0.2);
}

.field input:focus{
  border-color:var(--teal);
  background:rgba(26,188,156,0.06);
}

.field .field-icon{
  position:absolute;
  right:14px;
  bottom:14px;
  width:20px;
  height:20px;
  opacity:.3;
  pointer-events:none;
}

.field:focus-within .field-icon{
  opacity:.7;
}

/* ── OPTIONS ROW ─────────────────────────────────── */
.options-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:28px;
}

.check-label{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-size:13px;
  color:var(--muted);
  user-select:none;
}

.check-label input[type=checkbox]{
  width:16px;
  height:16px;
  accent-color:var(--teal);
  cursor:pointer;
}

.link-small{
  font-size:13px;
  color:var(--teal);
  text-decoration:none;
  opacity:.85;
  transition:opacity .2s;
}

.link-small:hover{opacity:1;}

/* ── BUTTON ──────────────────────────────────────── */
.btn-primary{
  width:100%;
  height:52px;
  background:var(--teal);
  border:none;
  border-radius:12px;
  color:var(--white);
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:700;
  letter-spacing:.5px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:transform .15s, box-shadow .2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn-primary::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);
  pointer-events:none;
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(26,188,156,.35);
}

.btn-primary:active{
  transform:translateY(0);
  box-shadow:none;
}

.btn-primary svg{
  width:18px;
  height:18px;
  fill:none;
  stroke:currentColor;
  stroke-width:2.2;
  stroke-linecap:round;
  flex-shrink:0;
}

/* ── DIVIDER ──────────────────────────────────────── */
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin:24px 0;
}

.divider::before,.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:var(--border);
}

.divider span{
  font-size:12px;
  color:var(--muted);
  white-space:nowrap;
}

/* ── SOCIAL BUTTONS ──────────────────────────────── */
.social-row{
  display:flex;
  gap:10px;
  margin-bottom:28px;
}

.btn-social{
  flex:1;
  height:44px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--white);
  font-family:'DM Sans',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transition:background .2s, border-color .2s;
  text-decoration:none;
}

.btn-social:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.18);
}

.btn-social svg{
  width:16px;
  height:16px;
  flex-shrink:0;
}

/* ── FOOTER LINK ─────────────────────────────────── */
.form-footer{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-top:28px;
}

.form-footer a{
  color:var(--teal);
  text-decoration:none;
  font-weight:500;
}

/* ── TAB SWITCHER ─────────────────────────────────── */
.tabs{
  display:flex;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  border-radius:10px;
  padding:4px;
  margin-bottom:28px;
  gap:4px;
}

.tab{
  flex:1;
  height:36px;
  border:none;
  border-radius:7px;
  background:transparent;
  color:var(--muted);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:background .2s, color .2s;
}

.tab.active{
  background:var(--teal);
  color:var(--white);
}

/* ── ANIMATIONS ──────────────────────────────────── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px);}
  to{opacity:1;transform:translateY(0);}
}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-14px);}
  to{opacity:1;transform:translateY(0);}
}

/* ── RESPONSIVE ──────────────────────────────────── */
@media(max-width:768px){
  .panel-left{display:none;}
  .panel-right{padding:32px 24px;}
}
</style>
</head>
<body>

<div class="auth-shell">

  <!-- ── LEFT: HERO ANIMATION ── -->
  <div class="panel-left">
    <canvas id="heroCanvas"></canvas>

    <div class="brand-badge">
      <div class="logo-mark">

<!-- ── HERO CANVAS SCRIPT ──────────────────────── -->
<script>
(function(){
const canvas=document.getElementById('heroCanvas');
const ctx=canvas.getContext('2d');
let W,H,dpr,t=0;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=canvas.offsetWidth; H=canvas.offsetHeight;
  canvas.width=W*dpr; canvas.height=H*dpr;
  ctx.scale(dpr,dpr);
}
resize();
window.addEventListener('resize',resize);

const BG0='#000814',BG1='#001a3d';
const TEAL='#1abc9c',GOLD='#f0c040',BLUE='#2e86c1',WHITE='#ffffff';
const HOZ=0.62;

const stars=Array.from({length:160},()=>({
  x:Math.random(),y:Math.random()*0.48,
  r:Math.random()*1.3+0.2,ph:Math.random()*Math.PI*2,sp:Math.random()*0.5+0.15
}));

const aurora=[
  {y:0.07,h:0.22,hue:165,ph:0},
  {y:0.14,h:0.18,hue:200,ph:1.4},
  {y:0.21,h:0.18,hue:180,ph:2.8},
];

const nodes=Array.from({length:22},()=>({
  x:Math.random(),y:0.06+Math.random()*0.38,
  vx:(Math.random()*0.0007+0.0002)*(Math.random()<.5?1:-1),
  vy:(Math.random()*0.0004-0.0002),
  r:Math.random()*2+1.5,ph:Math.random()*Math.PI*2,
  col:Math.random()<.5?TEAL:BLUE
}));

function bld(xr,wr,hr,floors,col,isUCU){return{xr,wr,hr,floors,col,isUCU};}
const bgBuildings=[
  bld(.01,.05,.24,4,'#011528'),bld(.07,.06,.36,6,'#011528'),bld(.14,.04,.20,3,'#011528'),
  bld(.20,.05,.30,5,'#011528'),bld(.27,.04,.18,3,'#011528'),bld(.32,.06,.28,5,'#011528'),
  bld(.39,.04,.22,4,'#011528'),bld(.45,.07,.42,7,'#011528'),bld(.53,.04,.26,4,'#011528'),
  bld(.59,.05,.32,5,'#011528'),bld(.65,.06,.38,6,'#011528'),bld(.72,.04,.20,3,'#011528'),
  bld(.77,.05,.30,5,'#011528'),bld(.83,.06,.24,4,'#011528'),bld(.90,.04,.32,5,'#011528'),
  bld(.96,.05,.42,7,'#011528'),
];
const fgBuildings=[
  bld(.00,.055,.22,4,'#012240'),bld(.06,.04,.34,6,'#012240'),bld(.11,.065,.26,4,'#012240'),
  bld(.18,.05,.44,8,'#012240'),
  bld(.27,.19,.60,10,'#002060',true),
  bld(.48,.055,.28,5,'#012240'),bld(.54,.04,.38,6,'#012240'),bld(.60,.07,.30,5,'#012240'),
  bld(.68,.055,.22,3,'#012240'),bld(.74,.045,.46,8,'#012240'),bld(.80,.065,.34,5,'#012240'),
  bld(.87,.055,.24,4,'#012240'),bld(.93,.08,.40,7,'#012240'),
];

const cars=[
  {xr:.05,speed:.0009,lane:0,col:GOLD,w:20,h:7},
  {xr:.45,speed:.0007,lane:0,col:TEAL,w:17,h:7},
  {xr:.75,speed:.001,lane:0,col:'#fff',w:15,h:6},
  {xr:.25,speed:-.0008,lane:1,col:GOLD,w:20,h:7},
  {xr:.65,speed:-.0006,lane:1,col:BLUE,w:17,h:7},
  {xr:.88,speed:-.0009,lane:1,col:'#ff6b6b',w:15,h:6},
];

let revealT=0;
const fullText='UCURide';

function drawAurora(){
  aurora.forEach(a=>{
    const wave=Math.sin(t*0.3+a.ph)*0.03;
    const gy=ctx.createLinearGradient(0,(a.y+wave)*H,0,(a.y+a.h+wave)*H);
    const alpha=0.04+0.025*Math.sin(t*0.25+a.ph);
    gy.addColorStop(0,'rgba(0,0,0,0)');
    gy.addColorStop(.3,`hsla(${a.hue},80%,55%,${alpha})`);
    gy.addColorStop(.7,`hsla(${a.hue+20},70%,45%,${alpha*0.7})`);
    gy.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gy;
    ctx.fillRect(0,(a.y+wave)*H,W,a.h*H);
  });
}

function drawMoon(){
  const mx=W*.80,my=H*.10;
  ctx.save();
  ctx.globalAlpha=.75;
  ctx.fillStyle='#fffde0';
  ctx.beginPath(); ctx.arc(mx,my,19,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=.55;
  ctx.fillStyle=BG0;
  ctx.beginPath(); ctx.arc(mx+11,my-4,17,0,Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.globalAlpha=.05+.015*Math.sin(t*.35);
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,70);
  mg.addColorStop(0,'rgba(255,253,210,1)'); mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(mx,my,70,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawNetwork(){
  for(let i=0;i<nodes.length;i++)
    for(let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j];
      const dx=(a.x-b.x)*W,dy=(a.y-b.y)*H;
      const d=Math.hypot(dx,dy);
      if(d<150){
        const alpha=(1-d/150)*.32;
        ctx.save(); ctx.globalAlpha=alpha;
        ctx.strokeStyle=TEAL; ctx.lineWidth=.8;
        ctx.beginPath(); ctx.moveTo(a.x*W,a.y*H); ctx.lineTo(b.x*W,b.y*H); ctx.stroke();
        const prog=((t*.35+i*.6+j*1.2)%1);
        const px=a.x+(b.x-a.x)*prog,py=a.y+(b.y-a.y)*prog;
        ctx.globalAlpha=alpha*2.5; ctx.fillStyle=WHITE;
        ctx.beginPath(); ctx.arc(px*W,py*H,1.6,0,Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }
  nodes.forEach(n=>{
    const pulse=.55+.45*Math.sin(n.ph+t*n.sp*8);
    ctx.save(); ctx.globalAlpha=.75*pulse;
    ctx.fillStyle=n.col;
    ctx.beginPath(); ctx.arc(n.x*W,n.y*H,n.r*(0.8+0.4*pulse),0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawGodRays(ucuX,ucuTop){
  ctx.save();
  const rays=8;
  for(let i=0;i<rays;i++){
    const angle=-Math.PI/2+(-Math.PI/3)+(i/(rays-1))*(Math.PI*2/3);
    const len=H*.55;
    const ph=t*.18+i*.7;
    const alpha=(.03+.02*Math.sin(ph))*(1-Math.abs(i-(rays-1)/2)/rays*0.8);
    const grd=ctx.createLinearGradient(ucuX,ucuTop,ucuX+Math.cos(angle)*len,ucuTop+Math.sin(angle)*len);
    grd.addColorStop(0,`rgba(26,188,156,${alpha*3})`);
    grd.addColorStop(.4,`rgba(26,188,156,${alpha})`);
    grd.addColorStop(1,'rgba(26,188,156,0)');
    ctx.fillStyle=grd;
    ctx.beginPath();
    ctx.moveTo(ucuX,ucuTop);
    const a1=angle-0.08,a2=angle+0.08;
    ctx.lineTo(ucuX+Math.cos(a1)*len,ucuTop+Math.sin(a1)*len);
    ctx.lineTo(ucuX+Math.cos(a2)*len,ucuTop+Math.sin(a2)*len);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

function drawCross(ucuX,ucuTop,glow){
  ctx.save();
  ctx.shadowColor=WHITE; ctx.shadowBlur=12*glow;
  ctx.strokeStyle=WHITE; ctx.lineWidth=3; ctx.lineCap='round';
  const s=14;
  ctx.beginPath(); ctx.moveTo(ucuX,ucuTop-s); ctx.lineTo(ucuX,ucuTop+s); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ucuX-s*.7,ucuTop-s*.25); ctx.lineTo(ucuX+s*.7,ucuTop-s*.25); ctx.stroke();
  ctx.restore();
}

function drawBuilding(b,isBack){
  const hoz=H*HOZ;
  const x=b.xr*W,bw=b.wr*W,bh=b.hr*H,by=hoz-bh;

  if(b.isUCU) drawGodRays(x+bw/2,by);

  ctx.fillStyle=b.col;
  ctx.fillRect(x,by,bw,bh);

  if(!isBack){
    const side=bw*.08;
    ctx.fillStyle='rgba(0,10,30,0.55)';
    ctx.fillRect(x+bw,by+side*.5,side,bh-side*.5);
  }

  if(b.isUCU){
    ctx.save();
    ctx.shadowColor=TEAL; ctx.shadowBlur=18;
    ctx.fillStyle=TEAL; ctx.globalAlpha=0.35+.15*Math.sin(t*.6);
    ctx.fillRect(x,by,bw,2);
    ctx.restore();
  } else if(!isBack){
    ctx.fillStyle='rgba(46,134,193,0.15)'; ctx.fillRect(x,by,bw,2);
  }

  const wRows=b.floors,wCols=Math.max(2,Math.floor(bw/10));
  const ww=Math.max(3,bw/wCols*.44),wh=Math.max(3,(bh/wRows)*.44);
  const padX=(bw-wCols*ww)/(wCols+1),padY=(bh-wRows*wh)/(wRows+1);
  for(let r=0;r<wRows;r++)for(let c=0;c<wCols;c++){
    const seed=(r*wCols+c)*7.3+(b.xr*100|0);
    const on=Math.sin(seed+t*(isBack?.3:.45))>(isBack?.15:-.25);
    if(on){
      const warm=Math.sin(seed*2.1+t*.18)>.15;
      if(b.isUCU) ctx.fillStyle=warm?'rgba(240,192,64,.9)':'rgba(26,188,156,.95)';
      else ctx.fillStyle=warm?'rgba(240,192,64,.48)':'rgba(150,200,255,.42)';
      ctx.fillRect(x+padX*(c+1)+ww*c,by+padY*(r+1)+wh*r,ww,wh);
    }
  }

  if(b.isUCU){
    const ucuX=x+bw/2,ucuTop=by;
    const glow=.65+.35*Math.sin(t*.9);
    drawCross(ucuX,ucuTop-10,glow);
    ctx.save();
    ctx.globalAlpha=.09+.05*Math.sin(t*.55);
    const rg=ctx.createRadialGradient(ucuX,ucuTop,0,ucuX,ucuTop,bw*.55);
    rg.addColorStop(0,'rgba(26,188,156,1)'); rg.addColorStop(1,'rgba(26,188,156,0)');
    ctx.fillStyle=rg; ctx.beginPath(); ctx.arc(ucuX,ucuTop,bw*.55,0,Math.PI*2); ctx.fill();
    ctx.restore();
    revealT=Math.min(revealT+.012,1);
    const chars=Math.floor(revealT*fullText.length);
    const label=fullText.slice(0,chars)+(chars<fullText.length&&Math.sin(t*6)>.3?'|':'');
    ctx.save();
    ctx.globalAlpha=.6+.2*Math.sin(t*.45);
    ctx.font=`700 13px "Syne",monospace`;
    ctx.textAlign='center'; ctx.fillStyle=TEAL;
    ctx.fillText(label,ucuX,ucuTop-40);
    ctx.restore();
  }
}

function drawRoad(){
  const hoz=H*HOZ,rh=H-hoz;
  const rg=ctx.createLinearGradient(0,hoz,0,H);
  rg.addColorStop(0,'#001428'); rg.addColorStop(1,'#000a18');
  ctx.fillStyle=rg; ctx.fillRect(0,hoz,W,rh);
  const lh=rh/2.5;
  ctx.strokeStyle='rgba(240,192,64,.22)'; ctx.lineWidth=1;
  ctx.setLineDash([24,16]);
  ctx.beginPath(); ctx.moveTo(0,hoz+lh); ctx.lineTo(W,hoz+lh); ctx.stroke();
  ctx.setLineDash([]);
  ctx.save();
  ctx.globalAlpha=.07+.03*Math.sin(t*.4);
  const refG=ctx.createLinearGradient(0,hoz,W,hoz);
  refG.addColorStop(0,'rgba(0,26,61,0)');
  refG.addColorStop(.37,'rgba(0,32,96,1)');
  refG.addColorStop(.5,'rgba(0,48,135,1)');
  refG.addColorStop(.65,'rgba(0,26,61,0)');
  refG.addColorStop(1,'rgba(0,26,61,0)');
  ctx.fillStyle=refG; ctx.fillRect(0,hoz,W,rh*.35);
  ctx.restore();
  ctx.fillStyle='rgba(26,188,156,.12)'; ctx.fillRect(0,hoz,W,1.5);
}

function drawCar(car){
  const hoz=H*HOZ,lh=(H-hoz)/2.5;
  const ly=car.lane===0?hoz+lh*.32:hoz+lh*1.08;
  const x=car.xr*W,cw=car.w,ch=car.h;
  const going=car.speed>0;
  ctx.save();
  ctx.globalAlpha=.12+.06*Math.sin(t*.5);
  ctx.fillStyle=car.col;
  ctx.fillRect(x-cw/2,ly+ch/2+1,cw,ch*.35);
  ctx.restore();
  ctx.fillStyle=car.col;
  ctx.beginPath(); ctx.roundRect(x-cw/2,ly-ch/2,cw,ch,2); ctx.fill();
  ctx.fillStyle=going?'rgba(255,255,200,.95)':'rgba(220,50,50,.9)';
  ctx.fillRect(going?x+cw/2-1.5:x-cw/2,ly-ch/2+1,2,ch-2);
  ctx.save(); ctx.globalAlpha=.15;
  const bx=going?x+cw/2+3:x-cw/2-3;
  const bl=ctx.createRadialGradient(bx,ly,0,bx,ly,18);
  bl.addColorStop(0,going?'rgba(255,255,200,1)':'rgba(220,50,50,1)');
  bl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=bl; ctx.beginPath(); ctx.arc(bx,ly,18,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function frame(){
  t+=.016;
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,BG0); sky.addColorStop(.55,BG1); sky.addColorStop(1,'#001428');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  drawAurora();
  drawMoon();
  stars.forEach(s=>{
    const b=.35+.65*Math.sin(s.ph+t*s.sp);
    ctx.save(); ctx.globalAlpha=b*.85;
    ctx.fillStyle=WHITE; ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  nodes.forEach(n=>{
    n.x+=n.vx; n.y+=n.vy;
    if(n.x<0)n.x=1; if(n.x>1)n.x=0;
    if(n.y<.05)n.vy=Math.abs(n.vy);
    if(n.y>.44)n.vy=-Math.abs(n.vy);
  });
  drawNetwork();
  bgBuildings.forEach(b=>drawBuilding(b,true));
  fgBuildings.forEach(b=>drawBuilding(b,false));
  drawRoad();
  cars.forEach(car=>{
    car.xr+=car.speed;
    if(car.xr>1.1)car.xr=-0.1;
    if(car.xr<-0.1)car.xr=1.1;
    drawCar(car);
  });
  const fog=ctx.createLinearGradient(0,H*HOZ,0,H*(HOZ+.06));
  fog.addColorStop(0,'rgba(0,8,22,0)'); fog.addColorStop(1,'rgba(0,8,22,.28)');
  ctx.fillStyle=fog; ctx.fillRect(0,H*HOZ,W,H*.07);
  requestAnimationFrame(frame);
}

frame();
})();
</script>

<script>
function switchTab(btn,which){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('form-login').style.display=which==='login'?'block':'none';
  document.getElementById('form-register').style.display=which==='register'?'block':'none';
}
</script>
